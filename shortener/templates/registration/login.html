{% extends "base.html" %}

{% block title %}Log in{% endblock %}

{% block content %}
<section class="panel auth-panel">
  <h1>Log in</h1>
  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary" type="submit">Log in</button>
  </form>
  <p>Need an account? <a href="{% url 'register' %}">Register</a></p>
</section>
{% endblock %}
