{% extends "base.html" %}

{% block title %}{% if object %}Edit URL{% else %}Create URL{% endif %}{% endblock %}

{% block content %}
<section class="panel">
  <h1>{% if object %}Edit short URL{% else %}Create short URL{% endif %}</h1>
  <form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <button class="primary" type="submit">Save</button>
      <a class="button" href="{% url 'shortener:list' %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
